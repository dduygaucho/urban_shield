# Render Blueprint: FastAPI only (deploy Next.js separately, e.g. Vercel).
# Dashboard: New > Blueprint > connect repo > select branch `deploy`.
# After deploy: set CORS_ORIGINS to your frontend origin (see docs/DEPLOY.md).

services:
  - type: web
    name: urban-shield-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: services/api
    # Render images do not ship `git-lfs`; download the official binary before `git lfs pull`.
    buildCommand: cd ../.. && curl -fsSL -o /tmp/git-lfs.tgz https://github.com/git-lfs/git-lfs/releases/download/v3.6.1/git-lfs-linux-amd64-v3.6.1.tar.gz && tar xzf /tmp/git-lfs.tgz -C /tmp && /tmp/git-lfs-3.6.1/git-lfs install && /tmp/git-lfs-3.6.1/git-lfs pull && cd services/api && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Comma-separated; set in dashboard to your deployed web app origin(s)
      - key: CORS_ORIGINS
        sync: false
